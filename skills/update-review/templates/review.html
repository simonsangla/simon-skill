<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Productivity Update — Review</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1117;
    --fg: #c9d1d9;
    --muted: #8b949e;
    --border: #30363d;
    --card-bg: #0d1117;
    --red: #f85149;
    --yellow: #d29922;
    --green: #2ea043;
    --blue: #58a6ff;
    --code-bg: #161b22;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
  }
  h1 {
    font: 600 22px/1.3 ui-monospace, "SF Mono", Menlo, monospace;
    margin: 0 0 .35rem;
    letter-spacing: -0.01em;
  }
  header p { color: var(--muted); margin: 0; font: 13px/1.4 ui-monospace, monospace; }
  .card {
    border: 1px solid var(--border);
    border-left-width: 3px;
    border-radius: 6px;
    padding: 1rem 1.25rem;
    margin: 1rem 0;
    background: var(--card-bg);
  }
  .card h2 {
    margin: 0 0 .6rem;
    font: 600 15px/1.3 ui-monospace, monospace;
    letter-spacing: -0.005em;
  }
  .card.red    { border-left-color: var(--red); }
  .card.yellow { border-left-color: var(--yellow); }
  .card.green  { border-left-color: var(--green); }
  .card.muted  { border-left-color: var(--muted); color: var(--muted); }
  .card.muted h2 { color: var(--fg); }
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font: 600 11px/1.3 ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    vertical-align: 1px;
  }
  .badge.red    { background: #f8514922; color: var(--red); }
  .badge.yellow { background: #d2992222; color: var(--yellow); }
  .badge.green  { background: #2ea04322; color: var(--green); }
  ul { padding-left: 1.3rem; margin: .4rem 0; }
  ul.checklist { list-style: none; padding-left: 0; }
  ul.checklist li { margin: .15rem 0; }
  ul.checklist li::before { content: "☐ "; color: var(--muted); font-family: ui-monospace, monospace; }
  ul.checklist li.done::before { content: "☑ "; color: var(--green); }
  code, kbd {
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 3px;
    font: 13px/1.3 ui-monospace, monospace;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .source {
    display: block;
    color: var(--muted);
    font: 12px/1.4 ui-monospace, monospace;
    margin-top: .35rem;
  }
  footer {
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font: 12px/1.5 ui-monospace, monospace;
  }
</style>
</head>
<body>

<header>
  <h1>productivity-update — review</h1>
  <!--
    {{TIMESTAMP}}
    Render as: <p>Run: <code>/simon-productivity:update-review</code> · &lt;track&gt; · YYYY-MM-DD HH:MM &lt;tz&gt; · invoked from <code>&lt;cwd&gt;</code></p>
  -->
  <p>Run: <code>/simon-productivity:update-review</code> · &lt;track&gt; · &lt;timestamp&gt; · invoked from <code>&lt;cwd&gt;</code></p>
</header>

<!--
  {{COMPLIANCE_CARDS}}
  One .card.red per active compliance flag. Each card:
    <div class="card red">
      <h2><span class="badge red">BLOCKED</span> &lt;short title&gt;</h2>
      <p>&lt;why this is flagged&gt;</p>
      <ul class="checklist">
        <li>&lt;Scenario A step 1&gt;</li>
        ...
      </ul>
      <span class="source">Source: &lt;gmail-thread / calendar-event&gt;</span>
    </div>
  If no compliance flags this run, emit:
    <!-- no compliance flags this run -->
-->

<!--
  {{FLAG_CARDS}}
  One .card.yellow per new Active item added to TASKS.md this run. Each:
    <div class="card yellow">
      <h2>&lt;item title&gt;</h2>
      <p>&lt;1-2 sentence detail incl. deadline/action&gt;</p>
      <span class="source">Source: &lt;gmail / drive / calendar / etc.&gt;</span>
    </div>
  If no new flags, emit:
    <!-- no new flags this run -->
-->

<!--
  {{MEMORY_PATCH_CARDS}}
  One .card per memory file touched. Each:
    <div class="card">
      <h2>memory: &lt;path/to/file.md&gt;</h2>
      <p>&lt;1-line summary of the change&gt;</p>
    </div>
  If no memory edits, emit:
    <!-- no memory edits this run -->
-->

<!--
  {{EXTERNAL_SUMMARY}}
  Single .card. Bullets follow this shape, omit lines for sources skipped or unavailable:
    <div class="card">
      <h2>external sources (last 30d)</h2>
      <ul>
        <li><strong>GitHub:</strong> &lt;N issues, M open PRs across repos&gt; — &lt;1-line relevance&gt;</li>
        <li><strong>Vercel:</strong> &lt;status&gt;</li>
        <li><strong>Calendar:</strong> &lt;count + flags surfaced&gt;</li>
        <li><strong>Gmail:</strong> &lt;count + categories&gt;</li>
        <li><strong>Drive:</strong> &lt;file count + folders&gt;</li>
        <li><strong>Apple Notes:</strong> &lt;count + status / "unavailable in session"&gt;</li>
      </ul>
    </div>
-->

<!--
  {{ALREADY_TRACKED}}
  Single .card.muted. Bulleted list of items confirmed still-current with no change.
    <div class="card muted">
      <h2>already tracked — no change</h2>
      <ul>
        <li>&lt;item&gt;</li>
      </ul>
    </div>
  If nothing was already-tracked-and-still-current, omit the card entirely.
-->

<!--
  {{SIMON_PLATFORM_FLAGS}}
  ONLY for simon-platform track. .card.red per §1–§7 violation (e.g. "done" claim without verified facts):
    <div class="card red">
      <h2><span class="badge red">§1–§7</span> &lt;task title&gt;</h2>
      <p>Claimed done without &lt;missing-evidence-type&gt;. Re-verify with: &lt;suggested command&gt;.</p>
    </div>
  Omit the whole block for non-simon-platform tracks.
-->

<!--
  {{SHIPPED_CARD}}
  .card.green ONLY if this run produced commits or PRs:
    <div class="card green">
      <h2>shipped this run</h2>
      <p>Branch <code>&lt;name&gt;</code> on <code>&lt;owner/repo&gt;</code> → PR <a href="...">#N</a>.</p>
      <p>Commits: <code>&lt;sha1&gt;</code>, <code>&lt;sha2&gt;</code></p>
    </div>
  Omit if read-only run.
-->

<footer>
  Generated by <code>/simon-productivity:update-review</code> · plugin <code>simon-productivity</code> · template <code>skills/update-review/templates/review.html</code>
</footer>

</body>
</html>

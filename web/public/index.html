<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D97757" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Productivity" />
  <title>Productivity</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg viewBox="0 0 32 32" class="brand-icon" aria-hidden="true">
        <rect x="4" y="2" width="24" height="28" rx="4" fill="#faf9f5" stroke="#D97757" stroke-width="2"/>
        <rect x="8" y="0" width="16" height="5" rx="2.5" fill="#D97757"/>
        <path d="M9 13l3 3 5-5" fill="none" stroke="#D97757" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="20" y="12" width="5" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="20" width="10" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="25" width="7" height="2" rx="1" fill="#c4c4c2"/>
      </svg>
      <div class="brand-text">
        <h1>Productivity</h1>
        <p class="meta" id="metaLine">Loading…</p>
      </div>
    </div>
    <nav class="tabs" role="tablist" aria-label="Main sections">
      <button id="tab-tasks" class="tab active" role="tab" aria-selected="true">Tasks</button>
      <button id="tab-memory" class="tab" role="tab" aria-selected="false">Memory</button>
    </nav>
  </header>

  <main>
    <section id="panel-tasks" class="panel active" role="tabpanel" aria-labelledby="tab-tasks">
      <div id="tasksContent" class="tasks-content"></div>
    </section>

    <section id="panel-memory" class="panel" role="tabpanel" aria-labelledby="tab-memory" hidden>
      <nav id="memoryTabs" class="memory-tabs" aria-label="Memory files"></nav>
      <div id="memoryContent" class="memory-content"></div>
    </section>
  </main>

  <div id="status" class="status" role="status" aria-live="polite"></div>

  <script src="/app.js" type="module"></script>
</body>
</html>
